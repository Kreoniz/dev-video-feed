services:
  dev-video-feed:
    build: .
    container_name: dev-video-feed
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      APP_NAME: ${APP_NAME:-dev-video-feed}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-900}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-15}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FEED_ENTRIES_PER_CHANNEL: ${FEED_ENTRIES_PER_CHANNEL:-7}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

